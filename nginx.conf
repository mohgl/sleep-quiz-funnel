server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Alle Pfade auf index.html fallen lassen, damit auch die
    # /h/<hotel-id>-URL-Variante funktioniert (sonst 404 auf statischem nginx).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets etwas cachen (greift nur, wenn du später z. B. ein Logo dazulegst).
    location ~* \.(?:css|js|png|jpe?g|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
